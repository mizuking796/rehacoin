<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>リハコイン</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪙</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪙</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ヘッダー -->
  <header id="app-header">
    <h1>🪙 リハコイン</h1>
    <span id="header-coins" class="header-coins">0 コイン</span>
  </header>

  <!-- ホーム画面 -->
  <main id="screen-home" class="screen active">
    <!-- 検索バー -->
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="活動を検索..." autocomplete="off">
    </div>
    <!-- 検索結果（インライン） -->
    <div id="search-results" class="search-results" hidden></div>

    <!-- 最近の記録 -->
    <section id="section-recent" class="section" hidden>
      <h2 class="section-title">最近の記録</h2>
      <div id="recent-list" class="recent-list"></div>
    </section>

    <!-- よく使う活動 -->
    <section id="section-favorites" class="section" hidden>
      <h2 class="section-title">よく使う活動</h2>
      <div id="favorites-list" class="favorites-list"></div>
    </section>

    <!-- カテゴリグリッド -->
    <section class="section">
      <h2 class="section-title">カテゴリ</h2>
      <div id="category-grid" class="category-grid"></div>
    </section>

    <!-- 自由入力 -->
    <section class="section">
      <h2 class="section-title">自由入力</h2>
      <div class="free-input-row">
        <input type="text" id="free-input" placeholder="自由に活動を入力..." autocomplete="off">
        <button id="free-input-btn" class="btn-primary" disabled>記録</button>
      </div>
    </section>
  </main>

  <!-- カテゴリ詳細画面 -->
  <main id="screen-category" class="screen">
    <div class="screen-header">
      <button id="category-back" class="btn-back" aria-label="戻る">← 戻る</button>
      <h2 id="category-title" class="screen-title"></h2>
    </div>
    <div id="activity-list" class="activity-list"></div>
  </main>

  <!-- 履歴画面 -->
  <main id="screen-history" class="screen">
    <h2 class="screen-title-fixed">きろく</h2>
    <!-- タブ切り替え -->
    <div class="history-tabs">
      <button class="history-tab active" data-tab="records">📊 記録</button>
      <button class="history-tab" data-tab="chain">⛓️ チェーン</button>
    </div>
    <!-- 記録タブ -->
    <div id="tab-records" class="tab-content active">
      <!-- 統計サマリ -->
      <div id="stats-summary" class="stats-summary"></div>
      <!-- 日付別記録 -->
      <div id="history-list" class="history-list"></div>
    </div>
    <!-- チェーンタブ -->
    <div id="tab-chain" class="tab-content">
      <button id="btn-verify-chain" class="btn-verify">🔍 チェーン検証</button>
      <div id="verify-result" class="verify-result" hidden></div>
      <div id="chain-list" class="chain-list"></div>
    </div>
  </main>

  <!-- 設定画面 -->
  <main id="screen-settings" class="screen">
    <h2 class="screen-title-fixed">設定</h2>
    <div class="settings-content">
      <div class="settings-item">
        <span>バージョン</span>
        <span>MVP 1.0.0</span>
      </div>
      <div class="settings-item">
        <button id="btn-export" class="btn-secondary">データをエクスポート</button>
      </div>
      <div class="settings-item">
        <button id="btn-clear-data" class="btn-danger">データを全削除</button>
      </div>
    </div>
  </main>

  <!-- マイニングオーバーレイ -->
  <div id="mining-overlay" class="mining-overlay" hidden>
    <div class="mining-content">
      <div class="mining-icon">⛏️</div>
      <div class="mining-title">マイニング中...</div>
      <div class="mining-nonce">Nonce: <span id="mining-nonce-val">0</span></div>
      <div class="mining-hash" id="mining-hash-val">Hash: 計算中...</div>
      <div class="mining-progress"></div>
    </div>
  </div>

  <!-- マイグレーションオーバーレイ -->
  <div id="migration-overlay" class="mining-overlay" hidden>
    <div class="mining-content">
      <div class="mining-icon">⛓️</div>
      <div class="mining-title">ブロックチェーン初期化中...</div>
      <div class="mining-nonce" id="migration-progress">準備中...</div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden>
    <span id="toast-text">🪙 リハコイン +1</span>
  </div>

  <!-- 下部ナビ -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-btn active" data-screen="screen-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">ホーム</span>
    </button>
    <button class="nav-btn" data-screen="screen-history">
      <span class="nav-icon">📊</span>
      <span class="nav-label">きろく</span>
    </button>
    <button class="nav-btn" data-screen="screen-settings">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">設定</span>
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/blockchain.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
