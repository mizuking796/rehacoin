<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リハコイン 管理ダッシュボード</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 320px; text-align: center; }
    .login-box h1 { font-size: 1.3rem; margin-bottom: 16px; }
    .login-box input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 10px; background: #4A90D9; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .login-box button:hover { background: #3a7bc8; }
    .login-error { color: #d32f2f; font-size: 0.85rem; margin-top: 8px; }

    .dashboard { display: none; }
    .dash-header { background: #2c3e50; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
    .dash-header h1 { font-size: 1.1rem; }
    .dash-header button { background: #e74c3c; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

    .dash-content { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #fff; padding: 16px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #4A90D9; }
    .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }

    .section { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 16px; margin-bottom: 20px; }
    .section h2 { font-size: 1rem; margin-bottom: 12px; color: #2c3e50; }

    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row input, .search-row select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    .search-row input { flex: 1; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; color: #555; }
    tr:hover { background: #f5f8ff; }
    .clickable { cursor: pointer; color: #4A90D9; text-decoration: underline; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
    .modal-close { float: right; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #888; }

    .detail-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .detail-stat { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; }
    .detail-stat .val { font-size: 1.3rem; font-weight: 700; color: #4A90D9; }
    .detail-stat .lbl { font-size: 0.75rem; color: #888; }

    .detail-section { margin-bottom: 16px; }
    .detail-section h3 { font-size: 0.9rem; color: #555; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }

    .btn-danger { background: #e74c3c; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-danger:hover { background: #c0392b; }
    .btn-primary { background: #4A90D9; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-primary:hover { background: #3a7bc8; }
    .action-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    .chart-container { height: 200px; position: relative; margin-bottom: 8px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 2px; height: 100%; }
    .bar { background: #4A90D9; border-radius: 2px 2px 0 0; min-width: 4px; flex: 1; position: relative; }
    .bar:hover { background: #3a7bc8; }
    .bar-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; white-space: nowrap; }
    .bar:hover .bar-tooltip { display: block; }

    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .pagination button { padding: 6px 12px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
    .pagination button.active { background: #4A90D9; color: #fff; border-color: #4A90D9; }
    .page-info { display: flex; align-items: center; font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>🪙 リハコイン管理</h1>
      <input type="password" id="admin-key-input" placeholder="Admin Key を入力">
      <button id="btn-admin-login">ログイン</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <div class="dash-header">
      <h1>🪙 リハコイン 管理ダッシュボード</h1>
      <button id="btn-admin-logout">ログアウト</button>
    </div>

    <div class="dash-content">
      <!-- Stats -->
      <div id="stats-grid" class="stats-grid"></div>

      <!-- Daily chart -->
      <div class="section">
        <h2>📊 直近30日間の記録数</h2>
        <div class="chart-container">
          <div id="daily-chart" class="bar-chart"></div>
        </div>
      </div>

      <!-- Top categories -->
      <div class="section">
        <h2>🏆 人気カテゴリ Top 10</h2>
        <table id="categories-table">
          <thead><tr><th>カテゴリ</th><th>記録数</th><th>コイン合計</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Users -->
      <div class="section">
        <h2>👥 ユーザー一覧</h2>
        <div class="search-row">
          <input type="text" id="user-search" placeholder="ニックネームで検索...">
          <select id="user-sort">
            <option value="created_at">登録日順</option>
            <option value="last_activity">最終活動順</option>
            <option value="total_coins">コイン順</option>
            <option value="record_count">記録数順</option>
            <option value="nickname">名前順</option>
          </select>
        </div>
        <table id="users-table">
          <thead>
            <tr>
              <th>ニックネーム</th>
              <th>記録数</th>
              <th>コイン</th>
              <th>フレンド</th>
              <th>最終活動</th>
              <th>登録日</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="users-pagination" class="pagination"></div>
      </div>
    </div>
  </div>

  <!-- User Detail Modal -->
  <div id="user-modal" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="btn-close-modal">&times;</button>
      <h2 id="modal-title">ユーザー詳細</h2>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const API = 'https://rehacoin-api.mizuki-tools.workers.dev';
    let adminKey = '';
    let currentPage = 0;
    const PAGE_SIZE = 50;

    // --- Auth ---
    document.getElementById('btn-admin-login').addEventListener('click', tryLogin);
    document.getElementById('admin-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    async function tryLogin() {
      const key = document.getElementById('admin-key-input').value.trim();
      if (!key) return;
      adminKey = key;
      try {
        const res = await apiFetch('/admin/stats');
        if (res.error) throw new Error(res.error);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        sessionStorage.setItem('rehacoin_admin_key', key);
        loadDashboard(res);
      } catch (e) {
        document.getElementById('login-error').textContent = '認証失敗: キーが正しくありません';
        adminKey = '';
      }
    }

    // Auto-login from session
    const savedKey = sessionStorage.getItem('rehacoin_admin_key');
    if (savedKey) {
      document.getElementById('admin-key-input').value = savedKey;
      tryLogin();
    }

    document.getElementById('btn-admin-logout').addEventListener('click', () => {
      sessionStorage.removeItem('rehacoin_admin_key');
      adminKey = '';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-key-input').value = '';
    });

    // --- API ---
    async function apiFetch(path, options = {}) {
      const res = await fetch(API + path, {
        ...options,
        headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey, ...(options.headers || {}) },
      });
      return res.json();
    }

    // --- Dashboard ---
    async function loadDashboard(stats) {
      renderStats(stats);
      renderDailyChart(stats.dailyRecords);
      renderTopCategories(stats.topCategories);
      loadUsers();
    }

    function renderStats(s) {
      const grid = document.getElementById('stats-grid');
      const items = [
        { value: s.totalUsers, label: '総ユーザー数' },
        { value: s.totalRecords, label: '総記録数' },
        { value: s.totalCoins, label: '総コイン発行' },
        { value: s.totalFriendships, label: 'フレンド数' },
        { value: s.totalWitnessed, label: '目撃確認数' },
      ];
      grid.innerHTML = items.map(i => `
        <div class="stat-card">
          <div class="stat-value">${i.value.toLocaleString()}</div>
          <div class="stat-label">${i.label}</div>
        </div>
      `).join('');
    }

    function renderDailyChart(data) {
      const chart = document.getElementById('daily-chart');
      if (!data.length) { chart.innerHTML = '<p style="color:#aaa;text-align:center;padding-top:80px">データなし</p>'; return; }
      const maxCount = Math.max(...data.map(d => d.count), 1);
      chart.innerHTML = data.map(d => {
        const h = Math.max((d.count / maxCount) * 100, 2);
        return `<div class="bar" style="height:${h}%"><div class="bar-tooltip">${d.day}<br>${d.count}件 / ${d.coins}コイン</div></div>`;
      }).join('');
    }

    function renderTopCategories(data) {
      const tbody = document.querySelector('#categories-table tbody');
      tbody.innerHTML = data.map(c => `
        <tr><td>${c.category_code || '(自由入力)'}</td><td>${c.count}</td><td>${c.coins}</td></tr>
      `).join('') || '<tr><td colspan="3" style="text-align:center;color:#aaa">データなし</td></tr>';
    }

    // --- Users ---
    let searchTimeout;
    document.getElementById('user-search').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => { currentPage = 0; loadUsers(); }, 300);
    });
    document.getElementById('user-sort').addEventListener('change', () => { currentPage = 0; loadUsers(); });

    async function loadUsers() {
      const search = document.getElementById('user-search').value.trim();
      const sort = document.getElementById('user-sort').value;
      const params = new URLSearchParams({ sort, order: 'desc', limit: PAGE_SIZE, offset: currentPage * PAGE_SIZE });
      if (search) params.set('search', search);

      const res = await apiFetch('/admin/users?' + params);
      renderUsers(res.users, res.total);
    }

    function renderUsers(users, total) {
      const tbody = document.querySelector('#users-table tbody');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="clickable" data-uid="${u.id}">${esc(u.nickname)}</td>
          <td>${u.record_count}</td>
          <td>${u.total_coins}</td>
          <td>${u.friend_count}</td>
          <td>${u.last_activity ? timeAgo(u.last_activity) : '-'}</td>
          <td>${new Date(u.created_at).toLocaleDateString('ja-JP')}</td>
        </tr>
      `).join('') || '<tr><td colspan="6" style="text-align:center;color:#aaa">ユーザーなし</td></tr>';

      // Click handler
      tbody.querySelectorAll('.clickable').forEach(el => {
        el.addEventListener('click', () => showUserDetail(el.dataset.uid));
      });

      // Pagination
      const totalPages = Math.ceil(total / PAGE_SIZE);
      const pag = document.getElementById('users-pagination');
      if (totalPages <= 1) { pag.innerHTML = ''; return; }
      pag.innerHTML = `
        <button ${currentPage === 0 ? 'disabled' : ''} onclick="currentPage--;loadUsers()">← 前</button>
        <span class="page-info">${currentPage + 1} / ${totalPages} (${total}件)</span>
        <button ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="currentPage++;loadUsers()">次 →</button>
      `;
    }

    // --- User Detail ---
    async function showUserDetail(userId) {
      const modal = document.getElementById('user-modal');
      const content = document.getElementById('modal-content');
      content.innerHTML = '<p style="text-align:center;padding:20px">読み込み中...</p>';
      modal.classList.add('active');

      const res = await apiFetch('/admin/users/' + userId);
      if (res.error) { content.innerHTML = `<p style="color:red">${res.error}</p>`; return; }

      const u = res.user;
      document.getElementById('modal-title').textContent = u.nickname + ' の詳細';

      content.innerHTML = `
        <div class="detail-stats">
          <div class="detail-stat"><div class="val">${res.totalCoins}</div><div class="lbl">総コイン</div></div>
          <div class="detail-stat"><div class="val">${res.spentCoins}</div><div class="lbl">使用済み</div></div>
          <div class="detail-stat"><div class="val">${res.availableCoins}</div><div class="lbl">残高</div></div>
        </div>

        <div class="detail-section">
          <h3>基本情報</h3>
          <table>
            <tr><td>ID</td><td style="font-family:monospace;font-size:0.8rem">${u.id}</td></tr>
            <tr><td>フレンドコード</td><td>${u.friend_code}</td></tr>
            <tr><td>公開範囲</td><td>${u.feed_visibility}</td></tr>
            <tr><td>登録日</td><td>${new Date(u.created_at).toLocaleString('ja-JP')}</td></tr>
          </table>
        </div>

        <div class="detail-section">
          <h3>フレンド (${res.friends.length})</h3>
          ${res.friends.length ? res.friends.map(f => `<span style="display:inline-block;background:#e8f0fe;padding:2px 8px;border-radius:12px;margin:2px;font-size:0.8rem">${esc(f.nickname)}</span>`).join('') : '<span style="color:#aaa">なし</span>'}
        </div>

        <div class="detail-section">
          <h3>最新記録 (${res.records.length}件)</h3>
          <table>
            <thead><tr><th>日時</th><th>活動</th><th>コイン</th><th>目撃</th></tr></thead>
            <tbody>
              ${res.records.slice(0, 20).map(r => `
                <tr>
                  <td>${new Date(r.timestamp).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
                  <td>${esc(r.label)}</td>
                  <td>${r.coins}</td>
                  <td>${r.witnessed ? '✅' : ''}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ${res.records.length > 20 ? `<p style="color:#aaa;font-size:0.8rem;margin-top:4px">他 ${res.records.length - 20} 件...</p>` : ''}
        </div>

        <div class="detail-section">
          <h3>ご褒美 (${res.rewards.length}件)</h3>
          ${res.rewards.length ? `<table><thead><tr><th>名前</th><th>コスト</th></tr></thead><tbody>${res.rewards.map(r => `<tr><td>${esc(r.name)}</td><td>${r.cost}</td></tr>`).join('')}</tbody></table>` : '<span style="color:#aaa">なし</span>'}
        </div>

        <div class="action-row">
          <button class="btn-primary" onclick="resetUserPassword('${u.id}')">🔑 パスワードリセット</button>
          <button class="btn-danger" onclick="deleteUser('${u.id}', '${esc(u.nickname)}')">🗑️ アカウント削除</button>
        </div>
      `;
    }

    document.getElementById('btn-close-modal').addEventListener('click', () => {
      document.getElementById('user-modal').classList.remove('active');
    });
    document.getElementById('user-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
    });

    // --- Actions ---
    async function resetUserPassword(userId) {
      const newPw = prompt('新しいパスワードを入力（8文字以上）:');
      if (!newPw || newPw.length < 8) { if (newPw !== null) alert('8文字以上で入力してください'); return; }
      if (!confirm('パスワードをリセットしますか？')) return;

      const res = await apiFetch('/admin/users/' + userId + '/reset-password', {
        method: 'POST',
        body: JSON.stringify({ password: newPw }),
      });
      if (res.error) { alert('エラー: ' + res.error); return; }
      alert('パスワードをリセットしました。\n\n新しいリカバリーコード: ' + res.recoveryCode + '\n\nこのコードをユーザーに伝えてください。');
    }

    async function deleteUser(userId, nickname) {
      if (!confirm(`「${nickname}」のアカウントを完全に削除しますか？\nすべてのデータが失われます。`)) return;
      if (!confirm('本当に削除しますか？この操作は取り消せません。')) return;

      const res = await apiFetch('/admin/users/' + userId, { method: 'DELETE' });
      if (res.error) { alert('エラー: ' + res.error); return; }
      alert('「' + res.deleted + '」を削除しました。');
      document.getElementById('user-modal').classList.remove('active');
      loadUsers();
      // Refresh stats
      const stats = await apiFetch('/admin/stats');
      renderStats(stats);
    }

    // --- Utils ---
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function timeAgo(ts) {
      const diff = Date.now() - ts;
      if (diff < 60000) return 'たった今';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '時間前';
      return Math.floor(diff / 86400000) + '日前';
    }
  </script>
</body>
</html>
